services:
  mqtt:
    container_name: "sme-mqtt"
    build: ./mosquitto
    ports:
      - "1883:1883"
    environment:
      MQTT_USER: ${MQTT_USER:-mqttuser}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    volumes:
      - ./data/mqtt_data:/mosquitto/data
      - ./data/mqtt_log:/mosquitto/log
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  timescaledb:
    container_name: "sme-db"
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-message_exchange}
      TS_TUNE_MEMORY: "1GB"
      TS_TUNE_NUM_CPUS: "1"
    volumes:
      - ./data/db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  api:
    container_name: "sme-api"
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: ${DB_USER:-user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-message_exchange}
      API_KEY: ${API_KEY}
      MQTT_BROKER: mqtt
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-mqttuser}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    depends_on:
      - timescaledb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  bridge:
    container_name: "sme-bridge"
    build: ./bridge
    environment:
      MQTT_BROKER: mqtt
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-mqttuser}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: ${DB_USER:-user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-message_exchange}
    depends_on:
      - mqtt
      - timescaledb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M